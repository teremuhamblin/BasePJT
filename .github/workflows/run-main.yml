name: Run BasePJT

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make run.sh executable
        run: chmod +x scripts/run.sh

      - name: Execute project
        run: bash scripts/run.sh
